services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "false"
      ENVIRONMENT: production
      HOST: 0.0.0.0
      PORT: 10011
      DATABASE_URL: sqlite+aiosqlite:////app/data/myai_studio.db
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - app-data:/app/data
    expose:
      - "10011"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10011/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.server
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    networks:
      default:
      lims_proxy:
        aliases:
          - qi-ai-studio-frontend

volumes:
  app-data:

networks:
  lims_proxy:
    external: true
    name: lims_default
