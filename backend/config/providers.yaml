# LLM Provider 配置文件
# 注意：API Key 通过环境变量配置，不要写在此文件中

# ============================================================
# 第一类：官方直连配置（按供应商划分）
# ============================================================
official:
  # DeepSeek 官方
  deepseek:
    base_url: "https://api.deepseek.com"
    api_key_env: "DEEPSEEK_API_KEY"
    timeout: 120
    max_retries: 3
    models:
      - id: "deepseek-chat"
        name: "DeepSeek Chat"
        context_length: 64000
        supports_vision: false
        supports_tools: true
        supports_reasoning: true
        modality: "text"
      - id: "deepseek-reasoner"
        name: "DeepSeek Reasoner"
        context_length: 64000
        supports_vision: false
        supports_tools: true
        supports_reasoning: true
        modality: "text"

  # Qwen 阿里云百炼
  qwen:
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    timeout: 120
    max_retries: 3
    models:
      # 文本模型
      - id: "qwen-plus"
        name: "Qwen Plus"
        context_length: 131072
        supports_vision: false
        supports_tools: true
        supports_reasoning: false
        modality: "text"
      - id: "qwen3-plus"
        name: "Qwen3 Plus"
        context_length: 131072
        supports_vision: false
        supports_tools: true
        supports_reasoning: true
        modality: "text"
      # 视觉模型
      - id: "qwen-vl-plus"
        name: "Qwen VL Plus"
        context_length: 32768
        supports_vision: true
        supports_tools: true
        supports_reasoning: false
        modality: "vision"
      - id: "qwen-vl-max"
        name: "Qwen VL Max"
        context_length: 32768
        supports_vision: true
        supports_tools: true
        supports_reasoning: false
        modality: "vision"
      - id: "qwen3-vl-plus"
        name: "Qwen3 VL Plus"
        context_length: 32768
        supports_vision: true
        supports_tools: true
        supports_reasoning: true
        modality: "vision"

  # OpenAI 官方（预留）
  openai:
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    timeout: 120
    max_retries: 3
    models: []

  # Anthropic 官方（预留）
  anthropic:
    base_url: "https://api.anthropic.com"
    api_key_env: "ANTHROPIC_API_KEY"
    timeout: 120
    max_retries: 3
    models: []

  # Google Gemini 官方（预留）
  gemini:
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    api_key_env: "GEMINI_API_KEY"
    timeout: 120
    max_retries: 3
    models: []

# ============================================================
# 第二类：OpenRouter 配置（按模态划分）
# ============================================================
openrouter:
  base_url: "https://openrouter.ai/api/v1"
  api_key_env: "OPENROUTER_API_KEY"
  timeout: 120

  # 文本模型
  text_models:
    - id: "google/gemini-2.0-flash-001"
      name: "Gemini 2.0 Flash"
      context_length: 1000000
      supports_tools: true
      modality: "text"
    - id: "anthropic/claude-3.5-sonnet"
      name: "Claude 3.5 Sonnet"
      context_length: 200000
      supports_tools: true
      modality: "text"
    - id: "anthropic/claude-3.5-haiku"
      name: "Claude 3.5 Haiku"
      context_length: 200000
      supports_tools: true
      modality: "text"
    - id: "openai/gpt-4o-mini"
      name: "GPT-4o Mini"
      context_length: 128000
      supports_tools: true
      modality: "text"
    - id: "meta-llama/llama-3.3-70b-instruct"
      name: "Llama 3.3 70B"
      context_length: 131072
      supports_tools: true
      modality: "text"
    - id: "deepseek/deepseek-chat"
      name: "DeepSeek Chat (OR)"
      context_length: 64000
      supports_tools: true
      supports_reasoning: true
      modality: "text"

  # 视觉模型
  vision_models:
    - id: "google/gemini-2.5-pro-preview"
      name: "Gemini 2.5 Pro"
      context_length: 1000000
      supports_vision: true
      supports_tools: true
      supports_reasoning: true
      modality: "vision"
    - id: "openai/gpt-4o"
      name: "GPT-4o"
      context_length: 128000
      supports_vision: true
      supports_tools: true
      modality: "vision"
    - id: "anthropic/claude-3.5-sonnet"
      name: "Claude 3.5 Sonnet Vision"
      context_length: 200000
      supports_vision: true
      supports_tools: true
      modality: "vision"

  # 音频模型（预留）
  audio_models: []

