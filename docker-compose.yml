services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "false"
      ENVIRONMENT: production
      HOST: 0.0.0.0
      PORT: 10011
      DATABASE_URL: sqlite+aiosqlite:////app/data/myai_studio.db
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - app-data:/app/data
    expose:
      - "10011"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10011/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env, e.g. ai.example.com}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend

volumes:
  app-data:
  caddy-data:
  caddy-config:
