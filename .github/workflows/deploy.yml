name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DEPLOY_PATH: /home/ubuntu/my-ai-studio
      BACKEND_IMAGE: ghcr.io/mingqi39/my-ai-studio-backend:latest
      FRONTEND_IMAGE: ghcr.io/mingqi39/my-ai-studio-frontend:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production images
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -t "$BACKEND_IMAGE" -f backend/Dockerfile.server backend
          docker build -t "$FRONTEND_IMAGE" -f frontend/Dockerfile.server frontend
          docker push "$BACKEND_IMAGE"
          docker push "$FRONTEND_IMAGE"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Activate release
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<SSH
            set -euo pipefail
            cd /home/ubuntu/my-ai-studio
            echo "${{ github.token }}" | sudo -n docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            sudo -n docker pull "$BACKEND_IMAGE"
            sudo -n docker pull "$FRONTEND_IMAGE"
            sudo -n docker tag "$BACKEND_IMAGE" my-ai-studio-backend:latest
            sudo -n docker tag "$FRONTEND_IMAGE" my-ai-studio-frontend:latest
            sudo -n docker logout ghcr.io
            sudo -n docker compose -f docker-compose.server.yml up -d --no-build
            sudo -n docker compose -f docker-compose.server.yml ps
          SSH
