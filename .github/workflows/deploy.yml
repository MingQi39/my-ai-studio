name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-images:
    name: Build production images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t my-ai-studio-backend:latest -f backend/Dockerfile.server backend
          docker build -t my-ai-studio-frontend:latest -f frontend/Dockerfile.server frontend
          docker save my-ai-studio-backend:latest my-ai-studio-frontend:latest | gzip > images.tar.gz

      - name: Upload built images
        uses: actions/upload-artifact@v4
        with:
          name: production-images
          path: images.tar.gz
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy from Mac
    needs: build-images
    runs-on: [self-hosted, macOS, deploy]
    permissions:
      contents: read
    env:
      DEPLOY_PATH: /home/ubuntu/my-ai-studio
    steps:
      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: production-images

      - name: Load and upload images from Mac
        shell: bash
        run: |
          set -euo pipefail
          SSH_KEY_PATH="$HOME/.ssh/id_ed25519_personal"
          test -r "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"
          docker load -i images.tar.gz
          docker save my-ai-studio-backend:latest my-ai-studio-frontend:latest | \
            ssh -i "$SSH_KEY_PATH" \
              -o IdentitiesOnly=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=40 \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              'sudo -n docker load'

      - name: Activate release
        shell: bash
        run: |
          set -euo pipefail
          SSH_KEY_PATH="$HOME/.ssh/id_ed25519_personal"
          ssh -i "$SSH_KEY_PATH" \
            -o IdentitiesOnly=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=40 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'SSH'
              set -euo pipefail
              cd /home/ubuntu/my-ai-studio
              sudo -n docker compose -f docker-compose.server.yml up -d --no-build
              sudo -n docker compose -f docker-compose.server.yml ps
          SSH
